<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Scholars: Misi Tata Surya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --space-bg: #050b18;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--space-bg);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        h1, h2, .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }

        #game-canvas {
            display: block;
            background: radial-gradient(circle at center, #1a1a2e 0%, #050b18 100%);
            box-shadow: inset 0 0 100px rgba(0, 243, 255, 0.1);
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 1rem;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }

        .neon-button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .neon-button:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="star-field"></div>

    <!-- Login Screen -->
    <div id="screen-login" class="fixed inset-0 flex items-center justify-center z-50 p-4">
        <div class="glass-panel p-8 w-full max-w-md interactive">
            <h1 class="text-3xl text-center mb-6 text-[#00f3ff]">SPACE SCHOLARS</h1>
            <p class="text-center text-gray-400 mb-8">Misi Penjelajahan Tata Surya</p>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">Nama Lengkap</label>
                    <input type="text" id="player-name" required class="w-full bg-slate-900 border border-slate-700 p-2 rounded focus:border-[#00f3ff] outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm mb-1">Kelas</label>
                        <input type="text" id="player-class" required class="w-full bg-slate-900 border border-slate-700 p-2 rounded focus:border-[#00f3ff] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">No. Absen</label>
                        <input type="number" id="player-absent" required class="w-full bg-slate-900 border border-slate-700 p-2 rounded focus:border-[#00f3ff] outline-none">
                    </div>
                </div>
                <button type="submit" class="w-full py-3 neon-button mt-4 font-bold">Mulai Misi</button>
            </form>
        </div>
    </div>

    <!-- Game HUD -->
    <div id="ui-layer" class="hidden">
        <div class="p-6 flex justify-between items-start">
            <div class="glass-panel p-4 flex gap-8">
                <div>
                    <p class="text-xs text-cyan-400">TARGET SKOR</p>
                    <p id="hud-score" class="text-2xl font-orbitron">0</p>
                </div>
                <div>
                    <p class="text-xs text-red-400">INTEGRITAS ROKET</p>
                    <div class="flex gap-1 mt-1" id="hud-lives"></div>
                </div>
                <div>
                    <p class="text-xs text-yellow-400">WAKTU TERSISA</p>
                    <p id="hud-timer" class="text-2xl font-orbitron">01:00</p>
                </div>
            </div>
            <div class="glass-panel p-4 text-right">
                <p id="hud-player-info" class="text-sm font-bold"></p>
                <p id="hud-question-count" class="text-xs text-gray-400">Pertanyaan 1/10</p>
            </div>
        </div>

        <!-- Question Display -->
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-full max-w-2xl px-4">
            <div class="glass-panel p-6 text-center border-b-4 border-b-cyan-500">
                <p id="game-question" class="text-xl font-medium">Memuat misi...</p>
            </div>
        </div>
    </div>

    <!-- Result & Leaderboard Screen -->
    <div id="screen-result" class="fixed inset-0 flex items-center justify-center z-50 p-4 hidden">
        <div class="glass-panel p-8 w-full max-w-2xl interactive overflow-y-auto max-h-[90vh]">
            <h2 id="result-title" class="text-3xl text-center mb-2 font-orbitron">MISI SELESAI</h2>
            <p id="result-status" class="text-center mb-6 text-xl"></p>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-slate-900 p-4 rounded text-center">
                    <p class="text-gray-400 text-sm">Skor Akhir</p>
                    <p id="result-score" class="text-4xl font-orbitron text-cyan-400">0</p>
                </div>
                <div class="bg-slate-900 p-4 rounded text-center">
                    <p class="text-gray-400 text-sm">Akurasi</p>
                    <p id="result-accuracy" class="text-4xl font-orbitron text-purple-400">0%</p>
                </div>
            </div>

            <h3 class="text-xl mb-4 font-orbitron border-b border-slate-700 pb-2">Papan Skor Global</h3>
            <div id="leaderboard-list" class="space-y-2 mb-8">
                <p class="text-center text-gray-500 italic">Menghubungkan ke satelit...</p>
            </div>

            <button onclick="window.location.reload()" class="w-full py-3 neon-button font-bold">Main Lagi</button>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- Firebase Configuration ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'space-scholar-game';

        let currentUser = null;

        // --- Game State ---
        let playerState = {
            name: '',
            class: '',
            absent: '',
            score: 0,
            lives: 3
        };

        const questions = [
            { q: "Planet manakah yang dikenal sebagai Planet Merah?", a: "Mars", options: ["Mars", "Jupiter", "Venus", "Saturnus"] },
            { q: "Planet terbesar di tata surya kita adalah...", a: "Jupiter", options: ["Saturnus", "Jupiter", "Neptunus", "Uranus"] },
            { q: "Apa nama planet yang memiliki cincin paling terlihat jelas?", a: "Saturnus", options: ["Uranus", "Saturnus", "Jupiter", "Neptunus"] },
            { q: "Planet yang paling dekat dengan Matahari adalah...", a: "Merkurius", options: ["Venus", "Merkurius", "Bumi", "Mars"] },
            { q: "Benda langit yang mengorbit planet disebut...", a: "Satelit", options: ["Asteroid", "Satelit", "Komet", "Meteor"] },
            { q: "Planet yang mendapat julukan Bintang Fajar adalah...", a: "Venus", options: ["Merkurius", "Mars", "Venus", "Jupiter"] },
            { q: "Satu-satunya planet yang diketahui memiliki kehidupan adalah...", a: "Bumi", options: ["Mars", "Bumi", "Venus", "Europa"] },
            { q: "Pusat dari tata surya kita adalah...", a: "Matahari", options: ["Bumi", "Jupiter", "Matahari", "Lubang Hitam"] },
            { q: "Berapa jumlah planet dalam tata surya kita?", a: "8", options: ["7", "8", "9", "10"] },
            { q: "Planet terluar dalam tata surya kita saat ini adalah...", a: "Neptunus", options: ["Pluto", "Neptunus", "Uranus", "Saturnus"] }
        ];

        let currentQuestionIndex = 0;
        let timeLeft = 60;
        let gameActive = false;
        let timerInterval;

        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let rocket = { x: 0, y: 0, w: 40, h: 60 };
        let bullets = [];
        let targets = [];
        let obstacles = [];
        let particles = [];

        // --- Auth Initialization (Rule 3) ---
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                console.log("Authenticated as:", user.uid);
                loadLeaderboard();
            }
        });

        // Start Auth process immediately
        initAuth();

        // --- Leaderboard Logic ---
        function loadLeaderboard() {
            if (!currentUser) return;
            
            // Path following Rule 1
            const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
            
            onSnapshot(scoresRef, (snapshot) => {
                const scores = [];
                snapshot.forEach(doc => scores.push(doc.data()));
                
                // Sort manually in memory (Rule 2)
                scores.sort((a, b) => (b.score || 0) - (a.score || 0));
                
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = scores.slice(0, 5).map((s, i) => `
                    <div class="flex justify-between items-center bg-slate-800/50 p-3 rounded border-l-4 ${i === 0 ? 'border-yellow-500' : 'border-cyan-500'}">
                        <div>
                            <span class="text-gray-400 mr-2">#${i+1}</span>
                            <span class="font-bold">${s.name || 'Anonymous'}</span>
                            <span class="text-xs text-gray-400 ml-2">(${s.class || '?'}-${s.absent || '?'})</span>
                        </div>
                        <div class="font-orbitron text-cyan-400">${s.score || 0}</div>
                    </div>
                `).join('');
                
                if(scores.length === 0) list.innerHTML = '<p class="text-center text-gray-500">Belum ada skor tercatat.</p>';
            }, (error) => {
                console.error("Firestore Error:", error);
                document.getElementById('leaderboard-list').innerHTML = '<p class="text-center text-red-400">Gagal memuat skor.</p>';
            });
        }

        async function saveScore() {
            if (!currentUser) return;
            try {
                // Path following Rule 1
                const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'scores');
                await addDoc(scoresRef, {
                    name: playerState.name,
                    class: playerState.class,
                    absent: playerState.absent,
                    score: playerState.score,
                    userId: currentUser.uid,
                    timestamp: Date.now()
                });
            } catch (e) {
                console.error("Error saving score:", e);
            }
        }

        // --- Game Setup ---
        window.addEventListener('resize', resize);
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            rocket.x = width / 2;
            rocket.y = height - 120;
        }
        resize();

        function createStars() {
            const container = document.getElementById('star-field');
            for(let i=0; i<100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }
        createStars();

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            playerState.name = document.getElementById('player-name').value;
            playerState.class = document.getElementById('player-class').value;
            playerState.absent = document.getElementById('player-absent').value;
            
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('ui-layer').classList.remove('hidden');
            document.getElementById('hud-player-info').innerText = `${playerState.name} | ${playerState.class}-${playerState.absent}`;
            
            startGame();
        });

        function startGame() {
            gameActive = true;
            spawnQuestion();
            updateLivesHUD();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('hud-timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 0) endGame("Waktu Habis!");
            }, 1000);

            requestAnimationFrame(gameLoop);
        }

        function spawnQuestion() {
            if (currentQuestionIndex >= questions.length) {
                endGame("Misi Berhasil!");
                return;
            }

            targets = [];
            obstacles = [];
            const qData = questions[currentQuestionIndex];
            document.getElementById('game-question').innerText = qData.q;
            document.getElementById('hud-question-count').innerText = `Pertanyaan ${currentQuestionIndex + 1}/10`;

            const spacing = width / (qData.options.length + 1);
            qData.options.forEach((opt, i) => {
                targets.push({
                    x: spacing * (i + 1),
                    y: -100 - (Math.random() * 100),
                    text: opt,
                    isCorrect: opt === qData.a,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: 1.2 + (Math.random() * 0.8),
                    radius: 40
                });
            });

            for(let i=0; i<2; i++) spawnAsteroid();
        }

        function spawnAsteroid() {
            obstacles.push({
                x: Math.random() * width,
                y: -100,
                vx: (Math.random() - 0.5) * 3,
                vy: 2 + Math.random() * 2,
                size: 35 + Math.random() * 35,
                rotation: 0,
                rv: (Math.random() - 0.5) * 0.1
            });
        }

        function updateLivesHUD() {
            const container = document.getElementById('hud-lives');
            container.innerHTML = '';
            for(let i=0; i<3; i++) {
                const heart = document.createElement('div');
                heart.innerHTML = i < playerState.lives ? '❤️' : '🖤';
                container.appendChild(heart);
            }
        }

        function endGame(reason) {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('ui-layer').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('result-status').innerText = reason;
            document.getElementById('result-score').innerText = playerState.score;
            document.getElementById('result-accuracy').innerText = Math.round((playerState.score / 1000) * 100) + "%";
            
            if (reason === "Misi Berhasil!") {
                document.getElementById('result-title').style.color = '#00f3ff';
            } else {
                document.getElementById('result-title').style.color = '#ef4444';
            }

            saveScore();
        }

        let mouseX = width / 2;
        window.addEventListener('mousemove', (e) => mouseX = e.clientX);
        window.addEventListener('mousedown', () => {
            if (gameActive) bullets.push({ x: rocket.x, y: rocket.y - 30 });
        });
        window.addEventListener('touchmove', (e) => mouseX = e.touches[0].clientX);
        window.addEventListener('touchstart', (e) => {
            if (gameActive) bullets.push({ x: rocket.x, y: rocket.y - 30 });
        });

        function gameLoop() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, width, height);

            const dx = mouseX - rocket.x;
            rocket.x += dx * 0.12;
            
            // Draw Rocket
            ctx.save();
            ctx.translate(rocket.x, rocket.y);
            // Flame
            ctx.fillStyle = Math.random() > 0.5 ? '#ff4d00' : '#ff9d00';
            ctx.beginPath();
            ctx.moveTo(-8, 25);
            ctx.lineTo(0, 45 + Math.random()*15);
            ctx.lineTo(8, 25);
            ctx.fill();
            // Body
            ctx.fillStyle = '#e2e8f0';
            ctx.beginPath();
            ctx.moveTo(0, -40);
            ctx.lineTo(20, 20);
            ctx.lineTo(-20, 20);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // Bullets
            bullets.forEach((b, index) => {
                b.y -= 12;
                ctx.fillStyle = '#00f3ff';
                ctx.fillRect(b.x - 2, b.y, 4, 15);
                if (b.y < 0) bullets.splice(index, 1);
            });

            // Asteroids
            if (Math.random() < 0.015) spawnAsteroid();
            obstacles.forEach((ast, aIdx) => {
                ast.x += ast.vx;
                ast.y += ast.vy;
                ast.rotation += ast.rv;

                ctx.save();
                ctx.translate(ast.x, ast.y);
                ctx.rotate(ast.rotation);
                ctx.fillStyle = '#4b5563';
                ctx.beginPath();
                ctx.rect(-ast.size/2, -ast.size/2, ast.size, ast.size);
                ctx.fill();
                ctx.restore();

                bullets.forEach((b, bIdx) => {
                    if (Math.hypot(b.x - ast.x, b.y - ast.y) < ast.size/2) {
                        bullets.splice(bIdx, 1);
                        createExplosion(ast.x, ast.y, '#4b5563');
                        obstacles.splice(aIdx, 1);
                    }
                });

                if (Math.hypot(rocket.x - ast.x, rocket.y - ast.y) < ast.size/2 + 20) {
                    hitPlayer();
                    obstacles.splice(aIdx, 1);
                }
                if (ast.y > height + 50) obstacles.splice(aIdx, 1);
            });

            // Targets
            targets.forEach((comet, cIdx) => {
                comet.x += comet.vx;
                comet.y += comet.vy;
                if (comet.x < 40 || comet.x > width - 40) comet.vx *= -1;

                ctx.fillStyle = '#bc13fe';
                ctx.beginPath();
                ctx.arc(comet.x, comet.y, 30, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px Rajdhani';
                ctx.textAlign = 'center';
                ctx.fillText(comet.text, comet.x, comet.y + 5);

                bullets.forEach((b, bIdx) => {
                    if (Math.hypot(b.x - comet.x, b.y - comet.y) < 35) {
                        bullets.splice(bIdx, 1);
                        if (comet.isCorrect) {
                            playerState.score += 100;
                            document.getElementById('hud-score').innerText = playerState.score;
                            createExplosion(comet.x, comet.y, '#00f3ff');
                            currentQuestionIndex++;
                            spawnQuestion();
                        } else {
                            hitPlayer();
                            createExplosion(comet.x, comet.y, '#ef4444');
                            targets.splice(cIdx, 1);
                        }
                    }
                });
                if (comet.y > height + 50) comet.y = -100;
            });

            // Particles
            particles.forEach((p, idx) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1;
                if (p.life <= 0) particles.splice(idx, 1);
            });

            requestAnimationFrame(gameLoop);
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<10; i++) {
                particles.push({
                    x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
                    life: 1, r: Math.random() * 3, color
                });
            }
        }

        function hitPlayer() {
            playerState.lives--;
            updateLivesHUD();
            document.body.classList.add('shake');
            setTimeout(() => document.body.classList.remove('shake'), 500);
            if (playerState.lives <= 0) endGame("Roket Hancur!");
        }

    </script>
</body>
</html>
