<script>
// Firebase configuration
try {
    var firebaseConfig = { 
        apiKey: 'YOUR_API_KEY', // add your API Key here
        authDomain: 'YOUR_AUTH_DOMAIN', // add your Auth Domain here
        projectId: 'YOUR_PROJECT_ID', // add your Project ID here
        storageBucket: 'YOUR_STORAGE_BUCKET', // add your Storage Bucket here
        messagingSenderId: 'YOUR_MESSAGING_SENDER_ID', // add your Messaging Sender ID here
        appId: 'YOUR_APP_ID' // add your App ID here
    };
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
} catch (error) {
    console.error('Firebase initialization error', error);
    // Fallback Firebase config if needed
    var fallbackConfig = { 
        apiKey: 'YOUR_FALLBACK_API_KEY',
        authDomain: 'YOUR_FALLBACK_AUTH_DOMAIN',
        projectId: 'YOUR_FALLBACK_PROJECT_ID',
        storageBucket: 'YOUR_FALLBACK_STORAGE_BUCKET',
        messagingSenderId: 'YOUR_FALLBACK_MESSAGING_SENDER_ID',
        appId: 'YOUR_FALLBACK_APP_ID'
    };
    firebase.initializeApp(fallbackConfig);
}

// Ensure form submit handler is functioning correctly
document.getElementById('yourFormId').onsubmit = function(event) {
    event.preventDefault();
    // Your form submission logic here
};
</script>
